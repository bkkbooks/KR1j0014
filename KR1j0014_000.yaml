body:
  text: 欽定四庫全書經部十字詁小學類一訓詁之屬提要臣等謹案字詁一卷國朝黃生撰生字扶孟歙縣人前明諸生是編取晉張揖字詁以名其書于六書多所發明每字皆有新義而根據博奧與穿鑿者有殊間有數字未安者如謂靃説文呼郭切案説文無反切今本反切乃徐鉉重校據孫愐唐韻所加此云説文作呼郭切殊誤謹附訂於此飛聲也而諸書用靃靡處又音髓今書地名人姓之類多用霍獨樊噲傳之霍人正義注先纍蘇果山寡三反先纍反即髓音也韻會諸家紙藥二韻兼收靃而霍則止一音蓋霍從佳其音當為髓靃本飛鳥聲借為地名因又借為人姓後省使作霍既為借義所奪其本音本訓遂失而于字之當用霍音髓者反作靃此霍之所以轉為呼郭反而靃之所以轉為先纍反也據其所説則霍但有先纍反之本音靃但有呼郭反之本音矣今考音切之古莫過玉篇廣韻玉篇靃字下注云息委切露也呼郭切飛聲廣韻于四紙靃字下注云靃麻草于十九鐸靃字下注云地名説文飛聲也則是靃本有髓之一讀並不因省借為霍始音髓也又玉篇霍字下注云呼郭切揮霍廣韻霍字下注云虛郭切揮霍爾雅霍山為南嶽又姓則是霍之一字在玉篇廣韻原止有呼郭反一音並無髓音惟史記正義注有息纍反而要不得謂止有息纍反一音也況白虎通曰南方霍山者霍之為言護也護乃呼郭反之轉音非先髓反之轉音然則班固讀霍已為呼郭反矣豈漢音猶不足據乎生又謂打字始于六朝今考後漢王延夀夢賦曰捎魍魎拂諸渠撞縱目打三顱又易林曰口飢打手則打字不始于六朝明矣此類殊為失考其他若謂大冪七個之冪當從諧聲與從坰者不同似蛇之鱓既借徒何切之鱓又借張演切之鱣而皆轉為常演切漢書注誤以張連切之鱣為釋又謂周禮玉人注瓚讀為􅊡􅖸之􅖸説文饡以羹澆飯釋文膏􅖸作膏饡故篇海􅖸即饡字內則釋文酏讀為􅊡之然反􅖸本又作􅊡並之然反此蓋明酏􅖸當並讀為􅊡非謂􅖸即􅊡字若以諸延切􅖸何以處玉人注之􅊡􅖸乎又謂干乾字通引後漢書獨行傳云明堂之奠干飯寒水又在晉帖所云淡悶干嘔之前此類則最為精核其他條似此者不可枚舉蓋生致力漢學而于六書訓詁尤為専長故不同明人之勦説也乾隆四十五年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書字詁白山黃生撰兄兄字説文以為長者以言語教誨其子弟故字從口此鑿也以長誨少父師皆可何必定兄愚以為當從兒省會意兒象小兒頭囟𩕄非未合形兄長於弟則囟合矣故作正義歙吳元滿著知不從口而遂改作亦妄刀小船曰刀字從舟省會意與刀斧之刀不同此即趙古則所謂雙音並義不為假借也詩誰謂河廣曽不容刀可證後人加舟作舠贅矣已布昔卜子夏辨三豕渡河為己亥渡河今人習其語所謂豕亥之訛是也古已字作亥字作布故與三豕字相近因以致訛若今之楷隸則書法縣絶矣茍不通古字曷明其説乎本古綱紀字布本古根荄字干支之亥並假借用之説文凡解干支字皆妄誕如云已承戊象人足亥而生子復從一起之類迷毒後人不淺爾爾語辭也諧午省聲旁二直指出辭之氣借為稱人之謂古或借爾或借汝或借乃或借若或借而方土不同各取其聲之相近者耳或疑諸聲略近獨若聲差逺不知若之上聲即汝也古人詞緩故無四聲之别卩古節字古奏字樂止為節樂作為奏指樂聲之悠揚中畫止之節義見矣反則為此反體會意也以其有節制之義故符節之節借之以其有節止之義故品節之節借之凡骨之止處為一節也諸家有主符節義者有主骨節義者余謂從反會意自當以節樂為正訓抑字古作樂奏之抑揚也故從從會意字形偶同反印故諸家惑之不欵識中丕顯字俱作則知毛詩凡言不顯皆丕顯也噫苟明古字六經注腳直可無煩耳侖和和諧諧篪箎吹四字從籥籥從侖從􅮎説文籥訓云樂之竹管三孔以和衆聲也從品從侖侖理也侖訓云思也從集從夫籥既從侖侖又訓理此非即書無相奪倫詩於論鼓鐘之本字乎蓋樂之條理謂之侖從象古簫形從集三合也會合樂之意冪鉉冪莫狄切以木橫貫鼎耳而舉之周禮考工記廟門容大冪七個又易之玉鉉即一物也按考工記冪作扃則知説文冪字正當作冪諧聲後人誤傳寫從因加以莫狄切失之逺矣又按轄訓鍵也鍵訓鉉也一曰車轄鉉訓舉鼎也易謂之鉉禮謂之冪詳轄鍵鉉三字互訓疑冪為舉鼎之物鉉特其鍵耳用冪橫貫鼎耳加鉉以塞冪端之空使不脫出如車軸之有轄門户之有鍵其用一也故字從金若與冪為一物則不宜從金矣三代名物至漢已大變易宜慎不及見此物故訓辭反覆不一然他訓既互發而本訓語反鶻突亦見其無識也孟字古作按禮緯云嫡長稱伯庶長稱孟見魏了翁讀書雜抄故字從子旁兩注指事明其為旁出也古名字作從卩從口疑與命字為一字命字從集從卩從口因名字義専故加集以别之古命字本只作耳以聲相命曰名故有所指而名之則去聲謂其所指之名則平聲既以名名此物則不能移於他物故借為命而有之之義孟子其間必有名世者史記云信命世之宏才索隱注云命者名也言賢人有名於世也按此但知訓命為名不知史記之所謂命世即孟子之所謂名世漢人去古未逺故其字義尚通用其曰名世者謂以天下為己任經世大業皆此人命而有之云耳史記信陵君傳云諸侯之客進兵法公子皆名之故世俗稱魏公子兵法又董仲舒奏云限民名田又鄧通傳云不得名一錢皆此義又世説云天生劉伶以酒為名名即命也小篆作訛為故後人失其義正疏梳匹鳥足之疏也並窗户之交疏也梳疏並理髮器也鳥足開而不斂故作匹字象之匹有稀義故窗戶之稀者曰櫛器之稀者曰疏並從匹會意兼諧聲疏所以通髮也故借為疏通之疏因借義専故去正從木作梳以别之凡稀疏之義當借用疏通之義當借用疏今人但作疏非是俗又妄為疏不知何故從束而束晳之姓或云本出二疏因避難而去匹者然則廣受二子其果姓疏耶與與本賜與之與今人誤用黨與之與或有作與者反以省筆俗書目之矣今之楷書或有不當省而省者或有當省而不省者以為茍趨簡率此又不然大抵變篆為隸字體因之大亂當省而不省失之贅不當省而省失之簡末俗從風而靡不知作俑何人可恨也亏丂兮曾弓凡引氣出聲之詞有引之而下者如亏丂即呵字之類有引之而上者如兮曾之類引之而下其形亦下其聲亦下引之而上其形亦上其聲亦上他字不溷惟亏借為亏往之亏則羽俱切傳注篇韻之家不知其理亏引聲之亏亦以羽俱切之蓋引聲之亏經史多借於轉音雍俱切而亏往之亏即無借用於者可知二義必分二音亏為引聲而下雍俱切之字何得溷為引聲而上羽俱切之字乎凡亏字詩中用之尤多義元易溷如之子亏歸猶孟所謂往之女家也亏以采蘩亏沼亏沚亏以用之公侯之事言往而采蘩亏沼亏沚者何所用乎往而采蘩亏沼亏沚以用之者公侯之事也此皆非引聲之字也又考工記鳬氏鐘兩欒謂之銑銑間謂之亏亏當讀為污窪同蓋欒者鐘口兩角也兩角之間窪然而進故謂之亏先鄭云鐘脣之上袪也袪當為俗書呿字呿張口貌言鐘體此處窪進如張口也字誤為袪疏解亦未明毋古本無毋字但借母字轉聲鐘鼎文凡禁止之母并從二注作或止作可見古無其字但從假借也自小篆誤連中畫作毋許氏遂為之説云從女有姦之者陸德明李濟翁諸人因而致辨毋母之異此但知以説文小篆為據而不知其誤正始小篆也兮歌之曳聲也凡風雅頌多曳聲於句末如葛之覃兮螽斯羽詵詵兮之類楚詞多曳聲於句中如吉日兮辰良穆將愈兮上皇之類句末則其聲必嘽緩而悠揚句中則其聲必趨數而噍殺此今樂古樂之别即於用字見之又兮字惟用之詩騷行文無取於此然老子云豫兮若冬涉川猶兮若畏四鄰云云已開後世文士之習􅎧􅎧都回切俗作堆小阜也敦古有阜音故爾雅丘一成曰敦丘借用敦注都昆切俗有墩字此即􅎧音之轉故注亦從俗音又玉敦之敦音對爾雅如覆敦者敦丘注音堆此亦當即音對或音頓詩至于頓丘或即借頓疏以覆敦者音堆以頓丘釋丘一成者並誤餳釋名餳洋也煮米消爛之洋洋然也急就章梨柿奈桃待露霜棗杏瓜棣饊飴餳據此則餳當音洋鄭注周禮簫如今賣飴餳所吹者疏音辭盈切説文訛從易作餳孫氏徐盈切篇海集韻切並同篇海復出二字從昜者徒當切從易者徐盈切集韻陽韻又與糖為一字戴侗六書故從之黃公紹韻會亦收庚陽二韻其陽韻糖字下注云亦作餳引詩有瞽注音唐按餳字無論從易從昜皆不可為徐盈切不知何以誤作此音考庚韻徐盈切並無第二字餳字遂為孤音此可疑也又揚雄方言餳謂之糖此正别其二名豈可為一字諸家作徒當切者益謬今世尚有此物正呼如徐盈切當是漢世自讀如洋至唐以後始訛轉其音耳信信古通借為字易屈信相感孟屈而不信是也按詩周頌有客信信毛注再宿曰信余謂當讀為一訓重即再宿義注家知訓為再宿而不知讀為申何歟紹説文以此為昭穆之昭孫氏市招切按禮王制三昭三穆及諸經史並作昭無有從紹者説者謂昭明也故南面為昭穆順也故北面為穆據此則昭止宜讀本音今韻書多與韶同切則李涪刋誤所云晉武帝以其父名昭改為韶音是也徐鍇繫傳郭恕先佩觹集並據説文破之徐云説文音韶又書作紹則非晉以後改明矣郭云説文自有紹穆字以昭為紹蓋借音耳豫謂説文之紹有可疑者紹穆字既無别訓又不單用則造文之始當並為穆制字今紹則特制穆則借用此何説也又紹既有本字何經傳史集並作昭紹字曽不一見蓋此即晉人所作之字而竄入説文者徐郭不明此意乃以説文為左據説文大經後人淆亂此豫所未敢深信也按今人通讀昭穆如本音李涪云豈宜以晉氏之諱行於我唐此或唐以後人始改讀乎梅氏字彚紹一音紹介行也未知何出石説文百二十斤為䄷後人省作石漢以石為奉祿之等故有二千石之稱今俗用此為儋都濫切俗作擔亦非字至呼二千石亦如此音此最鄙謬按漢書淮隂侯傳守儋石之祿又揚雄傳家無儋石之儲試從俗呼之可以一笑鋪門户鋪首以銅為獸面銜環著於門上所以辟不祥示守禦之義風俗通釋云昔公輸班見水中蠡引閉其户終不可開遂象之立於門户按今門上排立而突起者公輸班所飾之蠡也詳應之説乃是門上浮漚釘而以之釋鋪首豈應誤呼浮漚釘為鋪首故云爾乎按司馬長門賦云擠玉户以撼金鋪兮聲噌吰而似鐘音云金鋪有聲則其為環審矣屈膝屈膝所以持門户之鍵也其形屈曲有似人之屈膝故以名之李賀詩屈膝銅鋪鎖阿甄盧照鄰詩倡婦盤龍金屈膝其掩錢或飾以盤龍故云俗作屈戍非又或加金作􅘫銊益俗佁懝佁癡貌古或借騃並五回切俗作呆即敳音同字謬改集韻收入咍韻疑母此書廣收俗字甚足亂後人耳目也俗又以呆古保字又古孟字為佁此即取疑字旁謬省而作懝騃也與癡同孫氏以佁為夷在切以懝為五溉切並誤仞四尺曰仞倍仞曰尋孔鮒小爾雅此正義也蓋人伸兩臂以度謂之尋尋八尺也但伸一臂則謂之仞仞四尺也孔安國以為八尺何緣一度立二名鄭玄以為七尺應劭以為五尺六寸並無依據今按孟子掘井九仞本書作軔而不及泉以四乘九為三丈六尺此尋常掘井之數若以八乘九則為七丈二尺世未有掘井至七丈餘尚不得水不得水而猶掘至七丈餘者孟雖假喻然不應昧于物理如此又禮祭義蠶室近川而為之築宫仞有三尺蓋蠶室貴謹密逺風日故特低小也倩倩少好之貌草木初生色青故從青詩巧笑倩兮此言其笑之好也注云好口輔取與下美目相對義稍著不必也靚妝之靚當用倩靚乃靚召之靚於義無當俗又作靘亦非壻謂之倩猶以美少年稱之耳郭璞乃云言可借倩也此因倩有借義故云不從正義而從借義誤矣俠俠胡頰切古或借為夾字公羊注滕薛俠轂周興嗣千文路俠槐卿黃庭經幽俠之髙魏魏一老孰師謂豫云我教蒙童路俠槐卿俠讀為夾俗人莫不怪我失讀余曰都都平丈我俗謔瞽師郁郁乎文哉如此讀昔人志之矣子毋怪俗人也此老非深於字學者當是見梅氏字彚中作此讀耳千文雖小學之書其中亦有數字未經講明如桓公匡合一作輔合此當是宋人所改蓋宋避藝祖諱匡故又女慕貞潔紈扇圓潔二字字異而義同蓋古無潔字只作潔李斯會稽頌男女潔誠是也俗本女慕貞潔或亦作潔好事者疑千文不當有重出因改為烈此皆不知字義者也夤胂􅘡􅘡篇海余真切脊肉也古作夤説文訛從夕敬惕也一作説文夾脊肉也孫氏失人切誤一作見齊侯鐘借為寅字按本古字象夾脊肉或復從寅加肉如其箕肱肱之類古字時有此小篆訛而從夕故許氏誤訓又别從作故孫氏誤音篇海􅘡余真切舒仁切胰以脂切三字同訓夾脊肉集韻􅘡翼真切失人切又胰胂並弋枝切訓亦同黃公紹韻會以􅘡夤翼真切為一字以胰夤延知切為一字訓亦同蓋夾脊肉字俗呼如夷故别作胰自篇海而下夤之與􅘡與胂􅘡之與胂與胰其義或合或分其音或同或異皆不知夤乃夤之誤形􅘡乃夤之變體惟戴侗六書故合夤為夷真切一字而謂説文從夕為訛得之矣寅夤􅘡胂並余真切􅘡胂可轉以脂切俗胰不可用集韻韻會乃以夤之訓恭者與寅兼列真支二韻斯謬之甚者也篇韻又俱有䏖字訓與􅘡同音余忍切戴氏亦引同􅘡非是巾古巾用以拭手故佩於身以便作事又覆物者亦謂之巾禮巾以絺巾以綌之類其著于首者曰幘後世覆物謂之帕著首謂之巾陶潛詩空負頭上巾故謂在領者曰領巾見開天遺事拭手者曰手巾藉手者曰汗巾並近人語汗巾或謂之手藉見張邦基侍兒小名録以别於著首之巾著首者亦或謂之頭巾蘇軾詩不須灑面裹頭巾又古或以帕抹首本武士之服韓愈文以紅帕首誕這誕徒旱切發語詞生民詩云誕彌厥月自二章以至七章皆用誕字發端其為發語詞審矣義近乃俗因先生如達語遂謂生育為誕世説殷洪喬云皇子誕育此猶未害若俗謂生辰為誕辰至稱人為華誕則無理之甚籀文誕作這俗改為這音之夜切本借者或借遮為指事之詞篇韻並音疑戰切訓迎也郭忠恕佩觹集云迎這之這為者回之者其順莫有如此不知這亦俗作字也計計本算數之計借為計事之計古人計事必用手指畫使其事易見故曰運籌曰畫䇿曰籌畫曰圖謀曰規度皆計事之義籌謂以籌計之也䇿謂以䇿畫之也畫圜曰規畫方曰圖度謂量其事之長短也奄弇掩掩閹奄覆也又有餘也又欠也從大從申申展也弇蓋也掩斂也小上曰掩掩自關以東謂取曰掩一曰覆也閹豎也宫中閹閽閉門者以上並説文本訓按小上義當歸奄蓋器之小口大腹者其下寬展而上斂束故曰奄月令孟冬其器閎以奄是也周禮考工記鳬氏弇聲鬱作弇弇奄即一字虞書大禹謨奄有四海此即賈誼所云囊括四海之意并喻詞孔傳同也蔡傳盡也皆以意為説義未盡也又宫者謂之奄人言其精氣斂閉于內故以奄為名鄭注周禮酒人引月令其器閎以奄得其旨矣奄人之奄一作閹以司閽故孟子閹然媚於世趙注閹然大媚於世朱注閹如奄人之奄閉藏之意也言深自閉藏以求親媚於世趙注甚謬朱注似是而非蓋奄類婦人女子以媚悅人主為事故以為喻所謂衆皆悅之是鄉原之行也覆義當歸掩從上覆之從後取之並曰掩本掩取禽獸之義掩掩即一字又俗坩字篇海口甘切土器也當即弇之轉聲弇一音古南切杍理理説文治玉也杍説文杍古文李尚書梓材疏云本亦作杍馬云古作梓字治木器曰杍按治木之杍即李字本與治玉之理同音馬云古作梓字者言古本尚書梓字作杍也詳此則梓字後人所改先儒不知此即李字變體故誤從子音因改作梓疑周禮梓人字皆後人所改也凡九經中字漢儒誤讀誤改者甚多不特石經變古唐楷變石經也理李即杍字皆有治義故古書用理字亦通作李左傳昭十三行理之命無月不至又襄十八不使一介行李告於寡君管子書大理字皆作李漢書天文志騎官左角曰理史記天官書作李是也後人不知左傳行李之即行理故疑其誤李匡文資暇集謂李當作􅡛乃古使字此不知古文而妄作者演繁露及項氏家説已辨之詳矣集韻溷收􅡛字甚誤後人虜虜説文從毌從力徐鍇云左傳武夫力而拘諸原故從力毌音貫穿之也獲者以索拘之張有復古編云俗從男作虜余謂從毌從力者疑許氏之誤小徐曲為引證其説近迂虜謂勝敵所獲男女字正宜從男張徐皆稟承許氏太過不敢輕倍其説者也串貫摜遦毌串爾雅習也五患切説文闕即古貫古玩切字爾雅與貫同訓習此借義謝惠連詩聊用布親串言其所親識熟狎之人也又詩皇矣串夷載路串夷即昆夷借字轉音俗仍讀古患切非也爾雅注五患切則以此為玩字亦非俗用串為尺絹切則以此為穿去聲字亦非貫習之貫説文又作摜遦二字音工患切古玩切在翰韻工患切在諫韻二音有開合之異宣宣天子宣室也借與布之同用因宣布義又有明顯義語云五采相宣是也又易説卦傳巽為宣髮虞翻云李鼎祚易解為白故宣髮馬君以宣為寡髮非也陸德明云鄭本作宣又易林云宣髮龍身可證易為宣髮按今人以早見二毛者謂之蒜髮以其色似之也或曰算髮言以思算過多而早白也並即宣音之轉俗人強傅其義耳虙宓虙伏同音故伏羲氏之伏一作虙易作包犧莊子作伏戲史記作宓犧漢書律歷志作炮犧太史公傳作虙戲又宓美畢切與虙同諧必聲故史記借用宓又伏羲氏妃死為洛神曰宓妃上林賦青琴宓妃之徒揚雄甘泉賦屏玉女却宓妃曹植洛神賦洛水之神名曰宓妃孔子弟子宓子賤為伏羲之後而漢伏生又子賤之後蓋古字多因聲假借不甚拘也後人以宓音美畢切與虙音不通故有謂從宓者誤顔氏家訓云孔子弟子宓子賤即虙羲之後俗字亦為宓或復加山永昌城東有子賤碑漢世所立乃云濟南伏生即子賤之後是知虙之與伏古來通字誤以為宓較可知也郭忠恕佩觹集云以深宓之宓為虙賤其順非有如此者按二子所辨皆不通古音之過古伏虙皆讀如弼故宓虙皆以必為聲其虙妃虙賤之借用宓者音即隨之而轉但俗人仍讀如密則為大謬茍欲刋謬正俗者但當正其音不當斥其誤也紛氛鳻衯棼物分則亂故諸字從分者皆有亂義紛絲亂也左傳猶治絲而棼之也借用棼氛雨雪之亂也詩雨雪氛氛衯衣亂也上林賦衯衯裶裶鳻鳥聚而亂也或作􅡇莊子翂翂翐翐棼棼亂兒也書泯泯棼棼此借用字麟曓麒麟字本從鹿下吝俗誤用麟大牝鹿麟字幾廢嘉靖己酉應天發解首唐一麟主司不識其字遂欲易首賴藩司一吏識之因得不廢當放榜時內外簾及監臨提調諸官咸在竟無識麟字者非此吏則唐生瞪乎其後矣又洪武初殿試第一甲首孫曰參次某次邢寬書榜式字體相粘故曰參二字有類俗書暴字正作曓上云國家止宜刑寬豈宜孫暴遂易邢第一而孫居三夫唐以命名用古字幾失首解孫以命名近俗字竟奪大魁此皆字學蕪廢之過聖人在上考文之典安可緩乎洪武中亦嘗命儒臣修韻書今所行正韻是也然亦未盡當媵媵説文媵以證切送也爾雅作媵送也古者諸侯嫁女本國及他國皆以大夫送之謂之媵俗以妾義専故改從女從媵伊尹為有莘氏媵臣史記晉執虞公及其大夫并伯以媵秦穆姬左僖五年杜注送女曰媵以屈辱之公子結媵陳人之婦于鄄遂及齊侯宋公盟春秋莊十九年無傳成八年疏辭稱蠢愚不教故遣大夫隨之晉將嫁女于吳齊侯使析歸父媵之左傳伯姬歸于宋衛人來媵凡諸侯嫁女同姓媵之異姓則否左成九年諸侯娶一國則二國往媵之以姪娣從公羊莊十九其言以妾為妻奈何蓋脅于齊媵女之先至者也公羊僖八年注僖公本聘楚女為嫡齊女為媵媵蓋送女之名非謂所送之女為媵也醜醜説文訓可惡也按鬼貌醜惡故從鬼凡事物難過目者俱可借此稱故人貌陋者為醜男女所諱處亦謂之醜兼羞惡二義貌陋則可惡此本義也男女所諱處則羞於言此可羞義也禮內則龞去醜當是古人有此語偶然以之命物若醜類之醜其義即儔古音近而借用耳弗弼六字音同讀近方音之不弗説文分勿切訓橋也從從韋省字説文不收弻訓輔也重也以弜西聲弼皆重文弻字余考其文六字當即一字所謂弗者即詩秦風竹閉緄縢之閉以竹為之而以繩約於弛弓之裏所以檠弓體使正也今謂之弓牀弗字從弓不成字指其事也則從二弓一反一正檠弓者先反而後正此會意也有匡正之意故借為輔弻字古者繡其形於裳以備章服之制亦取輔弻為義注兩已相背取其辨此妄説也第此字重文多而借義廣故後世遂分為二字字竟以罕用而廢獨見米氏一印米名芾字元章蓋即取章服之義弗専為不然之辭弻専為輔弻之稱弻本借義無正字故書古文弼成五服詩佛時仔肩孟子法家拂士荀子諫爭輔拂通行借用主正義反為借義所奪因不知所從詩用閉固非儀禮用作䪐亦謬非皮革之物不當從韋伯溫知其失而以必字當之乃似是而非也弗之從弓於義較明而周不取繇不識古音故王董仲舒云説文引三畫而連其中為王三者天地人參通之者王也孔子曰一貫三為王李陽氷云中畫近上王者則天之義鄭樵云盛王本義也象物自地而出盛也戴侗云一貫三之説太巧非孔子之言且中畫近上李氏雖曲為之説終未通鄭氏之説亦迂或曰能一下土謂之王按書故字在疑部蓋不敢為確解也余見夏承碑王作其下分明從土漁仲蓋見及此但上畫謂物自地出不可通正當以能一下土為義耳然以上古帝號言之則皇先於王以制字言之則王實先皇疑古者以此為有天下之稱如易云古者庖犧氏之王天下也本但音旺至三代取以為帝號始轉平聲耳古之主世者但云某氏某氏而已三皇五帝皆後人增加之詞如云炎帝以火德王黃帝以土德王月令其帝太皥之類皆後世之語庾周禮注云十斗曰斛十六斗曰籔十籔曰秉四秉曰莒十莒曰稯十稯曰秅論語集注云庾十六斗秉十六斛此本周禮注數也按此則庾字當作庾始與籔聲相近漢人去古未逺必有所本庾字或傳寫之訛也小爾雅云釡二有半謂之藪朱注釜六斗四升以庾乘之正得十六斗不惜不借草履名按齊民要術乃作不惜初以為其字有誤諦思之當以不惜為正蓋因此物極賤雖履泥濕地亦不之惜故以為名乃知字作不借其誤久矣謂不須假借義殊無謂不惜見釋名齊人云摶臘猶把鮓粗貌也方言麻作者謂之不借説文不借綦古今注不借者草履也漢文帝履不借視朝周禮王􅋒注有薄借綦儀禮繩菲注今時不借也靦詩有靦面目字書注與靦同靦面慙也又㥏亦慚也今人謂羞澀曰腼腆不知語何所本字書無腼字腆訓厚也亦無慙義或又作靦靦則古本為一字今析為二字呼靦作偭音益訛嗖嗽相鷹書名見沈存中筆談篇海音述義闕又嗖音所祐切注驅鳥聲按此則嗽字當作嗖為近是丘嫂漢書楚元王傳過其丘嫂食注丘大也長嫂之稱也此訓未然丘空也謂無兄空有嫂也蓋是時髙祖長兄已沒耳陶吾鄉謂長曰陶如謂日長曰好陶大此語亦有所本楚辭陶陶孟夏尾尾字從尸從毛今人但知為鳥獸之尾此未達製字之義按説文訓微也從倒毛在人後蓋篆文作尸字乃人字在上之形尾謂穀道竅故從毛此竅在人隱微之處故訓微書鳥獸孳尾注交接曰尾蓋鳥獸交接俱在後故以尾名之尾竅非人所常語後遂専移此字於鳥獸矣今俗謂尾曰尾巴此語雖俗却有理蓋巴者把也言在尾竅後可把持也若單言尾是僅指其竅而已屈昔人有對句云投水屈凡勿切原終是屈曲勿切殺人曽子又何曽徂陵切此蓋取同字不同音為戲也然屈原之屈與屈伸之屈今久溷為一音矣又曽子名參史記注音驂今若讀曽參為曾驂人必發笑然觀其字子輿此自取驂乘之義古驂亦通作參漢書文帝召釋之參乘是也今之呼所金切乃為論語注所誤耳鵠鵠胡沃切説文云鴻鵠也廣韻云黃鵠又射鵠師古注相如賦云水鳥鶴曷各切説文鳥名鶴鳴九臯聲聞于天廣韻似鵠長喙朱頂詩注似鸛善鳴據此則鵠與鶴自是二種然古人多以鵠字作鶴字用如髙祖歌鴻鵠髙飛一舉千里西京雜記黃鵠下建章宫太液池曹洪馬名白鵠晉拂舞歌髙舉兩手白鵠翔阮籍詩黃鵠呼子安諸鵠字皆即鶴字若廣韻云鶴似鵠長喙丹頂則似謂不長喙丹頂者為鵠然此鸛也非鵠也若師古云水鳥與古多以鴻鵠並言則似是鴻雁之類若周禮司裘設其鵠注鵠小鳥取其難中則謬鵠果小鳥豈得與鴻並稱今人呼鵠為穀則蒙古韻所轉也戴侗鵠字注云或曰遼人謂之天鵝爹唐竇懷貞再娶韋后乳母王氏自稱皇后阿奢奢字當作㸙篇海㸙之邪切父也又爹字有屠可陟邪二切亦訓父也按南史始興王人之爹赴人急如水火此屠可切之證若陟邪則當音遮此音殊不合及考貫珠集云爹字陟邪不定門知二無時端二陳集韻爹字亦陟邪切正在端母之下乃知此字當音都邪切而㸙字亦同此音之邪即陟邪正與今人呼父之音合蓋㸙屠都三字並從者故得與爹同音而爹之變㸙屠可之轉都邪則本羌人呼父集韻注流入中國故無一定之字與音也俯俯俯二字同義不同音俯自音府俯自音眺後人以其義同遂誤呼俯為俯諸家韻書不辨其誤乃于嘯麌二韻兩收之不知俯字從兆聲無斐古切之理又俯字説文訓俯當亦同義不同音今字書亦收銑麌二韻並誤好説文好字訓云愛而不釋也女子之性柔而滯有所好則愛而不釋故于文女子為好若如所訓則文中子字為贅設矣余謂好從女從子蓋和合二姓以成配偶所謂好也詩君子好逑妻子好合乃其本義解者讀好逑字上聲讀好合字去聲非借為凡相睦之稱孟子言歸于好左傳修舊好二好字舊讀去聲並非言和好如婚姻也好為美德故借為惡之對人情慕好而惡惡故轉去聲為愛慕之義説文但以去聲為訓是以借義為正義于上聲之訓遂闕此其謬也又璧孔曰好考工記璧羡度尺好三寸以為度按詩豈無飲酒不如叔也洵美且好好音吼詳吼字乃諧孔音則知古孔好二字音相近故通借之拊掌録云好陜人作吼音又好字古借用畜畜音獸吕子引周書云民善之則畜也不善則讎也注畜好也孟子畜君者好君也亦此義注訓畜為止非孔孔字説文云嘉美之也從乙從子乙請子之候鳥也乙至而得子嘉美之也故古人名嘉字子孔按此以正借兩義溷訓解殊牽強蓋候鳥是正義嘉美是借義古孔好二音相近故孔亦訓嘉如鴻駿俱訓大鴻本鳥駿本獸以與洪俊字同音故借用之本訓中豈有此義哉祘算字古作祘蒜字從此六書正訛以為從二示會意非也此象布算縱橫之形偶同二示其實不然説文云算長六寸蓋古人算子如今之籌馬右軍筆陳圖云平直相似狀如算子便不是書平直即謂畫之橫豎五代史王章云措大輩把與一把算子不知倒順其製可見今就祘字字形思之想古人算法每位只用五籌遇六數則以一當五餘四籌下盡則又以一當十另從上位起數矣二示象左右二位二縱三橫象當五與畸零也戴侗解與余同按漢徐嶽數術記遺算法自積算至計算凡十四種有用籌者有用珠者今之算盤用珠是其遺制而用籌之法遂不傳矣僕射僕射之音夜漢官儀云僕主也古者重武事每官必有主射課督之關中語轉為此音此説未然按孔衍史記注云僕射小官扶掖左右者也余因此乃悟射字當讀為扶掖之掖與律中無射字同音僕附也見詩景命有僕注以其附近人主備扶掖之用故曰僕射員數既多後遂命之分領諸事故有謁者僕射冗從僕射城門僕射等名此既在人主左右其後漸掌機密自六朝來遂以尚書僕射為宰相之稱與侍中一官皆以至賤為至貴可怪也姪古兄弟之子猶子故不為之别立名號所謂姪者乃兄女之名耳以姪呼兄子始見唐狄仁傑云姑姪與子母孰親近人又書作侄字不知侄乃音質堅也癡也侄仡不前也又姪呼伯叔古人必連父字蓋伯叔但如今稱人之行第今卑幼于尊長使但以行第呼之可乎兄弟本同一氣叔姪恩猶父子其變兄子之名為姪去父之名單稱伯叔稱謂之間便是骨肉淺薄之一證也婀娜婀娜上烏可切下乃可切美貌又舒遲貌亦作阿那衛恆論書或縱肆阿那陸雲陸丞相誄珍裘阿那又袲衣服長好貌又橠木茂盛貌一作猗儺詩猗儺其華注柔順貌又旖旎旌旗從風貌楚辭紛旖旎乎都房亦作猗柅相如賦垂雲貌之猗柅韓愈元和聖德詩旗常婀娜東方朔七諫苦李旖旎余謂二字總輕婉柔弱之意在人則為婀娜在衣則為袲在木則為橠在旌旗則為旖旎故詩文中亦可互借為用猗儺詩音平聲旖旎一音倚你又一音伊泥此隨聲之轉各相其聲勢所協耳詩中又有單用者猗彼女桑佩玉之儺是也增韻亦作猗狔猶窈窕也又䭲馜香也婀娜亦作旖旎屠門髙琴引云美人旖旎紛嬆枻婀娜又作婑媠列子擇稚齒婑媠者以盈盈注阿挪上聲又韓愈元和聖德詩日君月妃煥赫婐𡛖也也羊者切語已辭也古通用殹於計切集韻于上聲年里切收也字此即從殹之轉聲也淮南子引詩其儀一也其儀一也心如結也以兮作也則也字當音猗大學引秦誓斷斷兮書本作斷斷猗此皆以聲之相近者通用耳也字後人又為語中之詞如李白詩投竿也未遲杜甫詩西蜀櫻桃也自紅之類是也此字古人却用亦字如書女亦昌言論語管氏亦樹塞門是也杜詩又云稚子也能賖注家以為此也字音夜方言如此未知唐人作此呼耶抑宋人自作此呼耶也字古人又作耶字用如論語子張問十世可知也井有人焉其從之也晉文春秋云非汝之讐也國䇿云非所謂學于子者也又然而春秋用兵者非以求主尊成王於天下也也字小篆作説文訓女人陰也初疑其誕諦思之字從從倒蓋指生人所從出之穴耳女陰為也自是古今語異又為借義所奪故後人遂迷其本訓欒考工記鳬氏為鐘兩欒謂之銑欒鐘口兩角也鄭注故書欒作樂杜子春云當為欒按角古音盧谷切與樂歷各切音相近故通借樂濼盧谷切從樂即一音之轉也又禮喪大記鬊爪實于緑中則以角為緑此亦其類今之欒字乃杜子春所改實無義也裏裏説文訓衣內猶內衣也褲謂之內衣詩弼風緑衣黃裏小雅不離于裏皆謂此屬毛言處胎時體氣與母相屬也離裏則直指出腹而言為難言下體故以下體所服為言耳詩注並誤古者上曰衣下曰裳皆在表惟褲在裏故説文訓衣內鱓俗有鱔魚古無其字故借鱓徒何切轉音常演切淮南子云鱓似蛇荀子云蟹非蛇鱓之穴無所寄託是也又或借鱣張連切轉音常演切後漢書楊震傳冠雀銜三鱣魚韓非説苑皆云鱣似蛇是也顔氏家訓云銜三鱓魚假借作鱣鮪之鮪俗因謂之鱣魚此顔但知鱣之為借音而不知鱓之亦借音也漢注誤以張連切之鱣為釋羅願爾雅翼力辨其誤又梁韋琳戲作鱔表省鱣作鱔亦通酉陽雜俎載此賦誤書鱔作鱔篇海一並收之徒增後人之惑烏於烏於本一字其借為歎辭者於乎古用於後用烏俗作嗚非是又有單言於者書用於孟子用惡然詳其意於之聲緩惡之聲急此歎美驚歎之别今俗驚歎詞直曰惡烏谷切則其聲更急矣然無用烏者其借為焉安之轉者孟子用惡惡在其敬叔父之類史漢多用烏亦無用於者蓋於借同于因借音既専遂與烏不相通是以古多用於後多用烏以於别占一音故也齊古書字尚簡故齋齋齍薺韲躋劑等字通借用齊禮齊衰孟齊疏之服本作齊玉藻趨以采齊本作薺周禮醢人五齊昌本脾析蜃豚拍深蒲本作韲禮記樂記地氣上齊本作躋周禮酒正五齊三酒考工記金有六齊本作劑又火齊才詣切珠名言其色如金之在劑也又尚書大傳多聞而齊給鄭注疾也史記五帝紀幼而徇齊裴駰云徇疾齊速當讀為資資給也言天性捷給也今讀本音似誤丿潑刺撇烈憊賴丿匹列切説文左戾也分勿切右戾也今作字丿謂之撇謂之捺二字古音拂戾撇捺者拂戾良薛切之轉也又杜詩船尾跳魚潑刺盧達切鳴此狀魚尾左右擲掉之意則潑刺亦拂戾之轉又千騎常撇烈此言其性之悍戾又俗語云憊賴亦乖戾意撇烈憊賴猶拂戾也蓋丿為左右相戾故諸字皆從此借義乙説文益悉切承甲象人頸乙黠切元鳥也按此當即一字而有二義二音元鳥之本從鳥省象形甲乙之乙則又借其形以指草木屈而未伸之象益悉乙黠二切本一聲之轉律歷志云奮軋於乙鄭元注月令云乙之言軋則是甲乙之乙亦可音軋也湯之名曰天乙則是元鳥之乙亦可音乙也後人以二聲分屬二義許氏以二字别為二形皆失其本克克古作即可字之變文克與可同義但轉其聲耳又堪戡亦聲之轉俞唯俞唯皆應詞今人作唯但聲出喉中而不言其字若嗄則俞之聲也嗄本所駕切元人曲中始作平聲為應詞用太太古音替故或作世如太叔為世叔鄭大夫遊吉也太室為世室太子為世子太祖為世祖之類是也觀字從世便得世太轉音之義理凡言文理者交錯曰文條遂曰理言義理者處事為義論事為理言道理者宏達曰道旨奧曰理痤説文痤才何切小腫也一曰族纍左傳桓六年瘯七木切蠡力果切陸德明引説文作瘯瘰云皮肥也今無此文按肥即痱芳未切古字通用今俗謂之癤吾鄉人謂之痤音近宰凡繩有結亦謂之痤連言之則曰痤瘰力改切詳吾鄉轉音之始則痤字古當音坐徂果切耳絼紖字彚紖直忍切牛系也引禮少儀牛則執紖絼與紖同引周禮封人設其楅衡置其絼按周禮注云絼著牛鼻繩今時謂之雉與古者名同又云絼字當以豸字為聲據此絼雉當同音明矣疏云絼本又作紖持忍切按禮少儀云牛則執紖紖則絼之别名云别名則二字同義不同音可知字書止因絼本又作紖五字遂誤合為一音殊屬鹵莽字彚承篇海之誤又禮疏申生雉經雉牛鼻繩謂以牛繩自縊而死怎咱波呸怎子肯切字本作咱上聲今北人語猶然蓋作麼之二合音也北無入聲故元人創作此字南人踵之又轉其聲為子肯切耳咱側皆切之為我則自家二字所合也又波羆囉呸不是並二合音哉載才哉載皆始也秦漢以來謂始為才裁才財同即此音之轉閏按閏月居門因字形與禮文偶合故俗儒傳會為説且置閏起于黃帝何因得有王稱愚謂閏字中當從玉古玉字三畫勻無點諧門聲玉之溫潤也後因閏月義専溫閏字遂借潤下之潤而本義亡矣橅塵東方朔與公孫𢎞書見北堂書抄何必橅塵而遊垂髮齊年偃伏以日數哉橅與模同今小兒以碎碗底方音督為􅒇搏土成餅即此戲也諸書載此皆訛橅為撫義遂不明升菴謂若佛書沙語亦影響酉孔子曰六畜之物皆能為怪故謂之五酉五行之方皆有其物酉者老也物老則為怪殺之則已見衝波集豫閲此語頓悟丣古酉字字當音力久切讀如栁栁老一聲之轉凡所從留柳窖聊等字皆可不隔聲而取而留熟於酉漢律歷志皆一以貫之矣又伏生尚書昧谷作柳谷豫謂此必丣字傳寫之訛蓋和仲所宅西方丣位故也酉本古酒字廢丣而用酉因加水而為酒丣字失本音其即用酉誤之乎因此又知斿字書一音流之即旒疣字書于求切訓瘤也之即瘤皆古今語變又字説文注祝也按即醫科之祝由歷書名昴宿為留言陽氣之稽留則今之作昴者亦誤漢封蔣澄為亭侯集韻烏后切方桐山引陳懋仁音后升菴謂當是函字之省其地則集韻注在溧陽田萟衡音函謂在宜興字彚注在桐城方桐山亦云桐有山按宜溧二縣接壤蔣本宜興人其所封宜在此此字他處不經用其形與聲皆可疑以豫度之當是字傳寫之誤即尚書三危之危古文如此形既相近而危偶同在疑母其轉聲更近也一有物混成先天地生視之不見聽之不聞強名曰道以立造化之根以成萬事萬物之紀萬事萬物其數莫殫歸根復命必統于一一也者又道之别名也在易曰極在書曰中極言至中言央皆一也天地萬物之數賾而不可紀聖人者出始制文字以成萬世之用天地之祕泄三才之紀立矣許慎氏創為説文解字書分别部居始一終亥其中以類相從一者數之始亥者數之凡亥猶該也井然粲然有條而不紊誠宇宙一大帳簿也後之人輒亂其次乃以五音韻譜目之而許公之旨全失非是書之一厄乎嗚呼噫嘻嗚呼噫嘻皆歎聲也聲輕則噫嘻聲重則嗚呼坡賦四字連用未免關門閉户矣然李華戰場文已先之耎偄嫩懦􅱢説文耎而沇切稍前大也讀若畏偄偄奴亂切弱也嫩而沇切好貌鉉等按切韻又音奴困切今俗作嫩非是需相俞切䇓也遇雨不進止䇓也􅱢泥展切轢也俗書偄作軟又作軟軟字合取耎􅱢而成軟字則􅱢之訛省也􅱢本訓轢即今俗書碾字音訓並不同誤偄為軟自玉篇始今按説文之訓則物之弱者曰耎人之弱者為偄此其分兩字意也然史漢諸書於前數字又多借用是以後人反切亦從而互訛如史記云選蠕觀望後漢清河王傳選懦之恩又西羌傳公卿選懦此借蠕懦為偄字也如考工記鮑人之則需又弓人薄其帤則需此以需為耎字也如莊子云以濡弱謙下為表此以濡為懦字也舊讀為耎非如考工記云馬不契需此以需為懦字也舊乃亂切非前漢武帝紀坐畏愞棄市此以愞為偄字也説文無此字注音如掾乃管二反韻會收入翰韻音奴亂切並非説文偄本而沇切孫氏乃音奴亂切嫩本奴困切孫氏乃音而沇切懦本音奴臥切孫氏乃音人朱切諸字既以溷借亂形復以誤音溷聲造次尋之正未易辨叀術音罥宋衛朴明叀術通雅謂測量之法挂空取線而箕之也按方言度空曰揣注音裳絹反疑即此字扶輿漢書相如賦蜚襳垂髾扶輿猗靡張揖注扶持楚王車輿相隨也師古非之云此自言鄭女曼姬為侍從者所扶輿而猗靡爾非謂扶持楚王車輿也顔雖破張説亦竟不知扶輿之義蓋扶輿即倣徉之轉音此形容美人蜚襳之飄揚垂髾之颭動輕弱宛轉之狀爾扶輿為倣徉之轉猶儲與平聲見淮南子為徜徉之轉也昌黎蓋得此解故采其字云氣之所窮盛而不過必蜿蜒扶輿盤薄而鬱積此皆形容地氣宛轉生動之意也韻會輿字注云扶輿佳氣貌又美稱引相如賦扶輿猗靡皆屬影響之見􅖸周禮玉人注瓉讀為􅊡􅖸之􅖸側旦反疏漢時有膏􅖸此本內則注狼臅臆中膏也以煎稻米則似今膏􅖸按字從半犀與側旦反之聲不近疑從羼省羼初限切作字而膏􅖸之為物則似説文之饡以羮澆食也篇海注䬤即古文饡􅖸諸延切厚粥也又則肝切此可知􅖸即饡䬤則􅖸之訛省爾其以􅖸為諸延切者由誤讀內則釋文酏讀為􅊡之然反􅖸本又作􅊡並之然反此蓋明酏􅖸二字當並讀為􅊡非謂􅖸即􅊡字也若以諸延切􅖸何以處玉人注之􅊡􅖸哉膏􅖸釋名作膏饡羼羼初限切羊相厠也按顔氏家訓云秦人滅學董卓焚書典籍錯亂皆由後人所羼非本文也此蓋言古書出前人而中有後代地名人物乃後人之筆雜厠其間也今人言竄入當作羼字又言點竄改竄此則是除逐之義點謂塗其字竄謂除其句也王莽傳哀章作銅匱書莽大臣八人又取令名王興王盛章自竄姓名凡十一人師古曰竄謂厠著也此竄是隱匿之意蓋托為符命署諸人封爵以是為欺隱如竄匿其中也然則以竄為厠自小顔已誤矣周禮司裘注以虎熊豹麋之皮飾其側又方制之以為謂之鵠著於侯演繁露引此作此字字書所無必傳寫之誤也陸釋文之允切本亦作準按乃古郭字不應讀為準而淳字古作􅙯􅙯可與準通周禮質人一其淳制注淳音準疑亦􅙯之誤烏焉成馬此之謂與賸説文賸物相增加也一曰送也副也孫音以證切按賸字俗作剩實證切物相增加也餘剩之義曰送曰副則義與媵説文作媵溷孫之以證切但為次義之音非初義之音徐鉉音切悉取孫愐唐韻凡許具二義者徐止切一音後人承之多致訛謬韻會於徑韻兩出賸字則當分注兩義可也乃於實證切之下但云益也餘也詳見本韻而以證切之下既引徐鍇本説文為注又引廣韻云長也增韻冗長也益也餘也唐書殘膏賸馥則是以餘賸之義從媵送之音可乎了鳥三國志注魏明紀董尋云使羣臣穿方舉上面目垢黑沾體塗足衣冠了鳥毁國之光按字書有􅤨二字䘨􅤨小袴也短衣也此言使羣臣釋衣冠而服短小之服也蓋細人力作衣服短小其形了鳥然因以名之後遂制􅤨二字篇海又作今按了鳥本縣物之貌服此衣者形體露見如物之懸挂也説文了字直訓了力弔切象子無臂形方言佻丁小反縣也注了佻縣物王延壽王孫賦古文苑楷書當作始可下筆瓜縣而瓠垂某都了切從倒了會意此文考創作叔重子雲但知其義而無其字故借借佻耳縣物今直用釣義亦通至雉經與拷賊又借用弔轉訛其字為吊則去之逺矣唐人詩鎖門金了鳥展幛玉鴉義今俗門戶鉸具極肖了字形眔鯤詩齊其魚魴鰥毛云鰥大魚鄭云鰥魚子孔疏云鯤鰥字異蓋古字通用或鄭本作鯤此孔疑毛鄭異説緣爾雅鯤為魚子故疑此亦鯤字也愚考諸書孔叢子云鰥魚其大盈車餌以豚之半則鰥信大魚矣而鄭以為小國語云魚禁鯤鮞則鯤信小魚矣而莊又極言其大疑古書傳寫交錯致悮按説文無鯤有鰥鰥從魚眔聲眔徒洽切目相及也鰥從眔聲不諧故李陽冰以為當從古昆弟字省然之從眔義亦難通戴侗六書故所以非孫氏之切也褱鰥三字皆從眔疑從眔為聲則眔當即古之所謂魚子眔從目從音姑魂切象小魚尾鬛未舒但見其目也説文無鯤字則眔即小魚之鯤鰥即大魚之鰥鄭誤解鰥為鯤莊誤以鯤為鰥內審於中庶不為諸字書所惑韻會以為鯤鰥古字通用兼具大小二義苯用修譏晦菴目孔明為盆引晉書笨伯字正之鄭侯升稗言謂晉書亦誤以笨乃竹中青而謂當作體然體乃篇海俗增之字古書所無何足刋前人之謬耶余考此字宜從草作苯廣韻苯䔿布衮祖本二切草叢生也叢生則與秀拔相反以此思之則苯之義可知矣按梁武與陶隱居論書云少墨浮澀多墨苯鈍正作此苯字安知晉書從竹非傳寫之誤耶靃霍説文靃呼郭切飛聲也兩而雙飛者其聲靃然是説文即以此為霍字矣然諸書用靃靡字又音髓劉安招隱士薠草靃靡石崇傳論春畦靃靡韓愈城南聮句春遊轢靃靡廣韻靃靡草木弱貌此以聲狀形宜其不可為呼郭切也今書地名人姓之類多用霍獨樊噲傳史記之霍人正義注先纍蘇果山寡三反以為即太原郡之葰人地理志葰人縣如淳音瑣師古又山寡反按正義初切之先纍上聲即髓音也韻會諸家紙藥二韻兼收靃而霍則止一音蓋霍之為葰止見樊噲傳注人多略之故耳方桐山通雅曽考及此以為佳音追唯誰雖從之故靃霍本音荽而音寉者攉因榷鸖因鶴形近也余不謂然今之單用霍者亦豈因霍而誤哉且方不取説文故於靃之音訓概不致察豫雖知靃本呼郭切而髓音又無可通之理久乃思而得之蓋靃霍本二字各音各義説文偶遺霍字後以互用遂成兩訛至今久假不歸耳霍從佳其音當為髓或為荽義闕靃本鳥飛聲借為地名因又借為人姓後省便作霍既為借義所奪其本音本訓遂失而於字之當用霍音髓者反作靃蓋地名人姓用之者多故取省便熟識之字草木靃靡用之者少故取隱僻稀見之字久之張三遂認為李四李四反變為張三矣幸霍字本音於史記注猶存一線使人得以追其兩誤之由此殆如流客久成土著雖不能遄歸故鄉然得知本身之所自來亦一快也以以古作象氣出形語詞也凡訓由訓用訓與訓因皆以聲近而借書大禹謨臨下以簡御衆以寬此從用為聲左傳昭十三魯故之以史記商君列傳卒受惡名於秦有以也夫此從由為聲論語以吾一日長乎爾無吾以也因我為爾師故不敢盡言戒其勿如此也易乾象君子以自強不息君子法天之行因自強不息諸卦大象倣此史記髙本紀贊忠之敝小人以野此從因為聲詩召南之子歸不我以注猶與也書金縢天大雷電以風論語使民敬忠以勸此從與為聲若考工記天有時以生有時以殺樂記治世之音安以樂亂世之音怨以怒此則但為轉語詞與而通用或叩由用因與聲近之義曰馮衍顯志賦願橫逝而無由上叶來者不可與期參同契蠢動莫不由上叶日月相撢持權輿樹根基是由古音夷也陸機旋皇輿於夷庚即詩之由庚易豐九三終不可用叶不可大事又剝上九終不可用叶民所載是用古與庸同古亦音夷也古真文多與支齊通如夤同胰賁音墳讀賁音肥敦讀敦音堆軍生暉斤生旗是因亦可音依也古魚模亦與支齊通如鼠為施上聲史首鼠兩端後鄧訓傳作首施蓋音轉諸為之母叶屺詩魏風居讀基檀弓是與亦可音以也打古無打字説文打都挺切乃徐鉉新增者按古止借提字為上聲典禮切如史記文帝紀以冒絮提文帝刺客傳以藥囊提荆軻吳王濞傳以博局提殺吳太子其義皆即打字為古今音轉故後人續制打字為用爾晉時呼打與等無别故逸少草書借為等而打字入用亦始六朝韻會引北史張彛傳擊打其門小補引穀梁傳宣十八注挩捶打也余又考宗凛嵗時記捶床打户顔之推家訓打拂之簸揚之六朝已前固無用打字者歸田録歐陽修以打音謫耿此門法所謂麻韻不定之切音當為鼎或疑滴字之誤非也字彚謂打一音滴引歐公歸田録則又去其耿字斯謬之甚矣以丁雅反為世俗言語之訛避暑録葉夢得又謂吳越俚人正以相毆擊為謫耿音然則謫耿之與丁雅正未易辨其孰為雅俗也余按此字見於六朝當是本音鼎都挺切本孫愐唐韻而北俗語音不正呼丁雅反流轉南方亦變其音如打之平聲為爹陟邪切亦麻韻不定之切此字亦起於北俗而中國襲稱之也今若讀北史歲時記家訓諸打字為丁雅反則音氣反順若讀為都挺切反覺生梗不安可見孫愐雖列於梗韻而時俗所呼文字所用皆未必從其音也歐公謂字從丁為擊物之聲故音謫耿為是不知何因轉為丁雅此蓋未晰北音之染於南也遊宦紀聞張世南云俗談謂打水打魚打船打傘之類於義無取則黃師尹謂丁當也以手當之也可以釋其疑矣若項氏家説謂俗間助語與本辭相反如打疊打聽打請打量之類又非可言以手當蓋凡起而作其事皆謂之打耳䆃封禪書䆃一莖六穗於庖犧雙角共抵之獸説文䆃禾也司馬相如曰䆃一莖六穗史記注徐廣云䆃瑞禾也索隱引鄭德云䆃擇也又引説文嘉禾一名䆃字林禾一莖六穗謂之䆃也漢書本傳但作導注鄭氏云擇也一莖六穗謂嘉禾之米於庖厨以供祭祀也按漢時相如揚雄皆通古文許氏多取其説此䆃字特引相如則知封禪本作䆃漢書導字或傳寫之誤爾索隱引鄭訓釋䆃字乃知相如自以擇米為䆃而以為嘉禾之名則諸家皆承説文之誤也據索隱所引則今説文訓內脫一嘉字又按導字本訓引無擇義漢少府導官主擇米以導為擇必漢時之通語特相如識其本字宜為䆃耳後遂通作導釋名導所以櫟鬢齊主衣中玉導古擇米必有其器櫟鬢之器似之故以為名唐百官志有導官令尚用此䆃字瓊自説文以瓊為赤玉故知字學者見書史中以瓊狀白色便謂其誤升菴不以為然特引雪賦林挺瓊樹以證之余謂雪賦尚是六朝人語自三百篇之後莫古於楚辭其中用瓊字不一而足至精瓊靡古糜字以為粻句寓言以玉屑為米確知瓊是白玉許氏之誤審矣凡言潔白物之白者必潔故楚詞多以玉為比若瓊果赤玉恐不足為況寫説文寫傳置也禮記器之溉者不寫其餘皆寫注謂傳之器中是也蓋傳此器之物置於他器謂之寫因借傳此本書書於他本亦謂之寫古云殺青繕寫又云一字三寫烏焉成馬又云在官寫書亦是罪過皆此義也今人以書字為寫字訛而不辨久矣又如弼風駕言出遊以寫我憂蓋謂沈憂不能去懷欲假出遊暫為排遣亦如將此憂傳置他處耳今人所謂寫懷寫恨寫意並襲而用之孰知古人本義竒妙如此乎睽車志常熟縣破山寺李唐新建柱有雷神書凡三處蓋世所傳謝仙火之類內一柱題字最端謹可識云溪作火田凡六字上一字從貝從力字書所無字皆作隸體倒書入木三分不類雕刻按字書負字簿回切音裴河神名又與倍同倍尾山名亦作負尾或即此字無字之音方言有有音無字者經典夕夕借字以寄其音如毛詩夜如何其及彼其之子二其字皆當讀基濁音檀弓何居居字當讀本聲濁音按東晳補亡詩中云彼居之子易其作居益信其字不音記矣書若之何其讀如字亦誤蓋何其何居皆發問之助語詞二音皆無正字故寄聲於其居之間若彼其係指他人之詞猶今人之稱渠此字亦呼在居渠之間也注家於何其音基於何居音姬而不發其借音之義既已迷誤後人若彼其之其音記則謬之甚矣禮表記引詩作彼記之子至外國之音以中國之字譯之如康居龜兹可汗之類居當讀居濁音不得竟讀為渠龜兹當讀鳩兹濁音不得徑讀為丘慈可音當近酷汗當讀平聲清音不得徑讀為克寒又休屠胸奴王號舊音朽除休當讀本聲濁音屠當讀諸濁音蓋譯語本無正字故古人借字以寄音不然何不徑以康居丘慈克寒譯其語乎凡言讀如某字濁音者本字皆無濁音此所謂無字之音也能熟辨字母之清濁即得之矣奔粗桯史載蘇東坡以奔粗二字難王荆公云牛之體壯於鹿鹿之足速於牛積三為字而義皆反之荆公無以答審爾則二公皆非識字者矣按粗字説文訓行超逺也吾鄉語行之速者猶有此稱以粗為大自是後人之語王撰字説穿鑿不經説文固宜未嘗留意蘇雖博洽恐小學亦其所忽使當時有引是書以證者二公皆俯首矣後山叢談載此作劉貢父譏荆公語俏韻會俏字注云俏措好貌唐韻無俏字此平水韻增者案古但作峭魏收有逋峭難為之語魏齊間指人有風措者謂之逋峭一曰波峭又唐曲江令朱隋侯與其女夫李逖遊客爾朱九并姿相少媚廣州人號為三樵七肖反則知此字古無正字樵峭并假借用耳按揚雄方言釥嫽好也注釥錯眇反疑此即今之所謂俏􅒩漕字有平去二音平聲乃衛邑名詩思須與漕是也其在去聲者乃漕運之漕韻會注引説文水轉轂也王隆小學篇以水通輸曰漕宋人以汪王對曹漕見老學庵筆記時有曹姓者為漕司舉汪王命客屬對客即對以曹漕蓋皆取其聲之轉也是歷漢至元無以此字作平聲者今則不然官曰漕撫船曰漕船糧曰漕糧並呼平聲不知此聲何時而轉惟安慶濱江之間有地名運漕則呼為去聲意此地或古時運道所經獨此猶未變其聲耳正世傳秦始皇諱政故民間呼正月之正作征音此説非也始皇本名政今政字何以反不諱而作去聲乎蓋正月之正本平聲後人不詳其義故駕言於祖龍耳余考正之為字本訓射的文從一從止射者必以步揣其逺近之準而施的焉故從止一為指事所以識其處也丐為避箭短墻為受矢之器皆從反正會意故知射的為正本訓射者必志正體直然後發矢不偏不激正中其處故借去聲為邪之對古者因斗柄所指之方以其月為嵗首蓋準此以為標的故曰正夏正商正三正之正亦當作平聲猶言斗柄所指之月耳若詩之雨無正注云雨無其極是無準的界限之義楚詞蓀獨宜兮為民正是為民準的之義皆音平聲則正月之正本不作去聲可知矣淮南説山篇云侯王寶之為天下正老子侯王得一以為天下貞善本亦作正后后字從石從一疑即古文厚字石者土之屬物厚莫如土一指其事也故天曰皇天地曰后土皆尊大之詞古稱天子曰皇后如書顧命云皇后憑玉几蓋尊之如天地耳亦有單稱后者書盤庚説命髙后詩周頌二后受之取長養萬物之義又有爵土者皆可通稱如后稷后夔胤后之類是也若人主之配稱后始見戰國時三代未嘗有此曲禮云天子之妃曰后此漢人抄撮之書未必盡本周制也囝囝集韻九於切與蹇字同音閩人呼兒曰囝按此字當音女琰切吾鄉謂小兒正作此呼集韻切腳九字疑為女字之誤所以知此字當音女琰切者蓋兒字一音倪古人計倪一名計研此即一音為開合研字上聲即近字女琰切矣字以子為義自當從兒為聲特方言不同故音因之而轉此可為解人言也干晉人帖云淡悶干嘔楊升庵曰淡古淡液之淡干古干溼之干今以淡作痰干作乾非也余謂此用修好古之過痰字古誠未有若乾字詩之乾餱春秋傳之乾溪易之乾胏豈得謂其非古而必干字為古乎干本干櫓之干借為水際之干易鴻漸于干鄭注謂大水之旁故停水處此指水旁乾地而言故乾濕之乾亦可借用干字余又考後漢書獨行傳云明堂之奠干飯寒水此又在晉人之先矣用修語本黃伯思東觀餘論欥欥余律切許慎注詮詞也引詩欥求厥寧今文欥作遹愚按詮詞謂自解説其上文語意之詞也詩云文王有聲遹駿有聲遹求厥寧遹觀厥成文王蒸哉後四語皆發明文王有聲之意言文王之所以有聲者豈無謂哉謂實大有其聲謂求國家之寧謂觀功業之成則皆文王之德之盛所致也蒸盛也舊注蒸為君非注但以遹為發語詞是不知説文詮詞之訓耳又按欥曰謂三字當即一義第稍轉其音耳古書又或借用聿與欥同音如詩謂行多露是解豈不夙夜之語也曰為改嵗入此室處是解穹垤薰鼠塞向墐户之意也書聿求元聖與之戮力以與爾有衆請命是解奉將天命明威不敢赦之意也台臺今書啓中所用台字如台候台照台禧之類蓋相尊之稱尊莫過于宰相故取三台之義又曰台下閣下臺下閣與台同意臺則執憲之官所居尊稍次于閣者也今俗遇書柬中台字輒誤以臺字呼之不知何説使或有用台臺者勢必不能不分為二音矣獨於單台字則異口同聲讀之曰臺亦何不思之甚紡國語執而紡於庭之槐晉語按紡當讀為繃悲萌切古字通用説文繃束也今俗綁字補項切即繃音之轉因轉音故字從而變也紡於庭槐即綁縛之義植木護本曰援謝靈運詩題南山樹園激流植援束之於樹其形似之故叔向嘲語云求繫既繫求援既援韋注釋紡為縣此臆説耳榸字書有榸字莊皆切木樁也吾鄉謂刀鈍曰謂手拘攣亦曰正作此音蓋木樁鈍而不鋭故取義於此嚲焦淡園俗書刋誤云耳垂曰耷皮寬曰㿴並音答吾鄉今有此語但呼如答平聲按此聲即嚲之轉鮦汝南郡有鮦陽縣孟康音紂紅反左傳注后漢書注並音紂孫韻鮦字下注云又直蒙直栁二切戴氏侗定為徒紅篆蛹二切韻會補定為音冡桐山云鮦從同自音同其音紂者皆訛失地志下紅反二字故也余謂音紂者固非音直蒙者亦未為是蓋鮦必音侗故以討紅為反訛討為紂故直蒙篆蛹因之存紂遺紅故直栁丈九字彚音因之桐山不悟紂字之訛謂古人口齒同重相溷引後漢書爞之作烔為證然字彚烔音他紅徒弄二切不與爞同音豈可以重童之衝衝鍾鐘而牽入同字哉汃汃普八切爾雅邠國説文作汃國則知此即古邠字從水從八聲八古分字其讀為頒汃從此得聲又按古别字從二八則八為古分字無疑也半字上從八亦意兼聲字八頒入聲即八布八切故借為數名而分字則加刀以别之後因分字有頒賜分别二義故又借頒班以異其聲然古人分别之分亦音頒左傳有班馬之聲是也余又悟書旅􅋙分寶玉於同姓之國及左傳四國皆有分國語分陳以肅慎氏之矢分魯以夏后氏之璜皆宜作班字讀廉周禮天官以六計弊羣吏如廉善廉能之類此廉字作察字解正作覝古借用廉耳後世廉訪使之名取義於此今人作貪廉之廉解殊謬宜宜古叶加靜言加之與子宜之其音當為那霆釋文云蜀本易以霆為電余因悟古霆電當即一字莊子外物篇有雷有霆水中有火乃焚大槐注云水中有火謂電也此亦一證按蝘蜓之蜓徒典切亦從廷是霆蜒並諧本音而轉其聲耳嘛嘛音媽口動也見山谷小詞字書不載吾鄉謂口欲發悲曰嘛閲黃詞則知宋人已有此語矣間俗從日非間空隙也言其事則去聲居晏切指其處則平聲病間曰憮然為間一間耳為間不用少間願有復也逢執事之不間彼節者有間未達一間間不容髮此去聲也其間不能以寸山徑之蹊間此平聲也碚陸遊入蜀記云過荆門十二碚字書無碚字不知音義云何近見明熊相峽中行作十二背言浪洶湧不可楫以繂若篙即人背之故也然則碚字音義即同背字必土人所作故不見字書也黃魯直黔南行記亦作碚郎當唐明皇自蜀還京道中聞駝馬所帶鈴聲謂黃幡綽曰鈴聲頗似人言語幡綽對曰似言三郎郎當三郎郎當明皇愧且笑郎當之轉口即籠東北史李穆云籠東軍士輕轉即彾行籠東之搭舌即龍鍾郎當之仄聲即落托大抵皆失志蹭蹬之意特古今方言轉口有異耳􅨢􅨢安盍切飾采謂之􅨢通作㔩婦人髻飾杜詩翠為㔩葉垂鬢脣按吳興有罨畫溪本取其處山水如設色之畫詳聲義罨亦當與􅨢通今作掩聲頗無義南都教坊頓仁論絃索按九宫譜用滚絃釤絃花和大和皆有定則故新曲度入亦易若南九宫原不入調無定則可依絃索若多一彈少一彈則板矣字書巨岐切參差也此謂絃與板不相應正參差之意余因悟西廂記中拍了迎風户半開蓋借言詩與事相左猶腔不應板耳當時作者自能調絃度曲故直用本色語如近的順手把戒刀釤釤字亦似從釤絃字來釤所鑑切大鐮也釤絃借言指法有似刀芟草之勢䌈墢倚番張祐詩連收榻索馬榻當作䌈音同以索羂物也馬散牧未就羈靮必用䌈索羂其首而後可御北人無入聲故呼䌈為去後又作此套字套即䌈也又書家摹書有響榻之語謂就原本雙鈎廓填而成亦如套得其字然余嚮不解榻字因張祜詩頓悟榻之即䌈䌈之即套爾抄寫舊文謂之套此與摹舊書同義又皮日休詩八會舊文多搭寫即抄寫意又錢功父淡山雜識云取筆榻子榻其兩中指榻即套也蓋古無套而䌈字頗僻故詩人隨意取其聲之相似者用之又陸龜蒙詩花盤小墢字彚音鉢義同晴初壓俗謂花盤為花鉢當用此墢字又竹牀蒲倚但髙僧古無椅字故書為倚又獨孤及近日霜毛一畨新陸龜蒙又見靈苗一番齊皆讀番去聲可為杜詩會須上番看成竹之證其義即更番之番但唐時方言作去聲讀宋人注杜強音為筤其陋甚矣此皆唐詩有關于字學者聊識其大略于此字詁
